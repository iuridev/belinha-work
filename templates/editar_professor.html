{% extends 'base.html' %}
{% block title %}Editar — {{ professor.nome }}{% endblock %}

{% block conteudo %}
<div class="page-header">
  <div>
    <a href="{{ url_for('professores') }}" class="btn btn-sm" style="margin-bottom:8px">← Voltar</a>
    <h1>Editar Professor</h1>
    <p class="subtitulo-page">As alterações são salvas diretamente na planilha Google Sheets.</p>
  </div>
</div>

<div class="card" style="max-width:480px">
  <h2 class="card-titulo">Dados do Professor</h2>

  <form method="POST">
    <div class="campo">
      <label>Nome completo *</label>
      <input type="text" name="nome" value="{{ professor.nome }}" required autofocus>
    </div>
    <div class="campo">
      <label>CPF</label>
      <input type="text" name="cpf" value="{{ professor.cpf or '' }}" placeholder="000.000.000-00"
             maxlength="14" oninput="formatarCPF(this)">
    </div>
    <div style="display:flex; gap:10px; margin-top:4px">
      <button type="submit" class="btn btn-primario" style="flex:1">Salvar alterações</button>
      <a href="{{ url_for('professores') }}" class="btn" style="flex:1; text-align:center">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
function formatarCPF(input) {
  let v = input.value.replace(/\D/g, '').substring(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
  input.value = v;
}
</script>
{% endblock %}
