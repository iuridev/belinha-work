{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block conteudo %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">📊</div>
    <h1 class="login-titulo">Avaliação Docente</h1>
    <p class="login-subtitulo">EE Dona Belinha · SEDUC-SP</p>

    {% if erro %}
      <div class="alerta alerta-erro">{{ erro }}</div>
    {% endif %}

    <form method="POST">
      <div class="campo">
        <label>Login</label>
        <input type="text" name="login" placeholder="seu.login" required autofocus>
      </div>
      <div class="campo">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••" required>
      </div>
      <button type="submit" class="btn btn-primario btn-bloco">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
